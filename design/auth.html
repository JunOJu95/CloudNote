<!DOCTYPE html>

<html class="light" lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007bff",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="flex min-h-screen w-full flex-col lg:flex-row overflow-hidden">
<!-- Left Section: Brand & Hero -->
<div class="relative hidden w-1/2 flex-col justify-center bg-primary p-12 lg:flex">
<div class="absolute inset-0 opacity-20" data-alt="Abstract notebook and workspace background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAaaZjEBIp6tlqJBCTXK5s_aoy4DT3F5waSBrIDZle2xjix_a7vSqN1xB4De4fgRD0lEEotgXbmofPqSx1at6D8ewa67t0BZB8mAcNlYJVwoxrc00CDasyAo-FZ5Hx2qTj4V8k78XJhDSrEVfsl5tE65VliarQSDfPHJzo0h4NbIO44Sb9hVKE8sY9uAdWNw88BHKuOBm_7ZASO6146gi9lsKKVhtlkkY3cgzGtlM5ZqH-LsElAxuHZ4u01b8K3RCkWikD1pmcD7-o'); background-size: cover; background-position: center;"></div>
<div class="relative z-10 flex flex-col gap-6 text-white">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-4xl">cloud</span>
<span class="text-2xl font-bold tracking-tight">CloudNote</span>
</div>
<div class="flex flex-col gap-4">
<h1 class="text-5xl font-black leading-tight tracking-tight">
                        생각을 정리하는<br/>새로운 방법
                    </h1>
<p class="text-xl font-medium opacity-90">
                        10만 명의 사용자가 선택한 스마트 노트 앱<br/>CloudNote와 함께 지금 시작하세요.
                    </p>
</div>
<div class="mt-8 flex gap-4">
<div class="flex -space-x-3 overflow-hidden">
<img alt="User 1" class="inline-block h-10 w-10 rounded-full ring-2 ring-primary" data-alt="Portrait of a user" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCU0f3-0o7JoTO64IKvUyq_-KZuBE9u89ERjPQFpmXDlYNy_kVS_nWo5X_G-Wy7doLJXZol6X_VhDlzmYqq_LwT7nYcnsvC_6Utv6n4NG-ckNDd3E4fgPzMcjOeFYrLbjOcuMTfQPvydG0mjkBkoxitTbRtymhqv_q9w953RRbmeGFl0RpN8eRo4oiaVQpyfZFAHLjIBLXovedWKlR4UFUEwmywwk3s0j4hDiYI4ZPrCYpzSOkJbvHPej7-FwJTVSfB60mG1mxW5hM"/>
<img alt="User 2" class="inline-block h-10 w-10 rounded-full ring-2 ring-primary" data-alt="Portrait of a professional man" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAH3dW0AnaJ_z6PkW_hqr2c3wlW6IvMYwdfGADbxL5dorUPh7939jCVgDAFYUVTjBDDxlivQ58KGfzT7Z7gKPAP6rReqwnBo_tJYTJUnNX8JVWDPksuBHjBZrYlqFtasRyokKgllbmyZ_Nipg_cJCKt1fPS5HW78O7aLe0U2nATokvCKoUn5FVxdr1EtL1_gCpzHsNvohKg_yCFCStskLiXz3s_zRPgDH-S1U41f6jP0Q9w424SbeHVwuvc1hMEJhOp-wTJSPYUToE"/>
<img alt="User 3" class="inline-block h-10 w-10 rounded-full ring-2 ring-primary" data-alt="Portrait of a smiling woman" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAKvCf5PJlabRrF9X3ZRqcE8MPBYSrPU1S4Cu_sCu2BNPZ_zPUB9ZnBh2bLrx93JSiNz0D6bHCIqOwMwq4iwkynf_2ossJtDPWv43Di-lFEDcaUocK5eKuiT26lSJaM5g8cGeCOjWp5_ic-FsDrwniRClQHI58iPsW0r1ghzVNsFphE2nErnnopZocmBMdCasvncMLnQSjnFnoqO7enOGqlx7RAxFrpd91y8YDjYWL8dQgIod9NPuuBUrCjYASl1mHvSB-jtegqYAU"/>
</div>
<p class="text-sm self-center font-medium">지금 이 순간에도 수많은 노트가 생성되고 있습니다.</p>
</div>
</div>
</div>
<!-- Right Section: Form -->
<div class="flex w-full flex-col justify-center bg-white dark:bg-background-dark px-6 py-12 lg:w-1/2 lg:px-20 xl:px-32">
<div class="mx-auto w-full max-w-md">
<!-- Mobile Logo -->
<div class="mb-10 flex items-center gap-2 lg:hidden">
<span class="material-symbols-outlined text-3xl text-primary">cloud</span>
<span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">CloudNote</span>
</div>
<!-- Tabs -->
<div class="mb-8 border-b border-slate-200 dark:border-slate-800">
<div class="flex gap-8">
<button class="border-b-2 border-primary pb-4 text-sm font-bold text-slate-900 dark:text-white">로그인</button>
<button class="border-b-2 border-transparent pb-4 text-sm font-bold text-slate-500 hover:text-slate-700 dark:text-slate-400">회원가입</button>
</div>
</div>
<!-- Form Content -->
<div class="flex flex-col gap-6">
<div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">반가워요! 다시 오셨군요.</h2>
<p class="mt-2 text-sm text-slate-500 dark:text-slate-400">서비스를 이용하려면 계정에 로그인하세요.</p>
</div>
<form class="flex flex-col gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">이메일 주소</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full rounded-lg border border-slate-200 bg-slate-50 py-3 pl-10 pr-4 text-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-slate-800 dark:bg-slate-900 dark:text-white" placeholder="example@cloudnote.com" type="email"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<div class="flex items-center justify-between">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">비밀번호</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">비밀번호를 잊으셨나요?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full rounded-lg border border-slate-200 bg-slate-50 py-3 pl-10 pr-12 text-slate-900 focus:border-primary focus:ring-2 focus:ring-primary/20 dark:border-slate-800 dark:bg-slate-900 dark:text-white" placeholder="비밀번호를 입력하세요" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex cursor-pointer items-center gap-2">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400">로그인 상태 유지</span>
</label>
</div>
<button class="mt-2 flex w-full items-center justify-center rounded-lg bg-primary py-3.5 text-base font-bold text-white transition-opacity hover:opacity-90" type="submit">
                            로그인하기
                        </button>
</form>
<!-- Social Login -->
<div class="relative my-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white px-2 text-slate-500 dark:bg-background-dark dark:text-slate-400">또는 다음 계정으로 로그인</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 rounded-lg border border-slate-200 py-3 text-sm font-semibold text-slate-700 transition-colors hover:bg-slate-50 dark:border-slate-800 dark:text-slate-300 dark:hover:bg-slate-900">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                            구글
                        </button>
<button class="flex items-center justify-center gap-2 rounded-lg bg-[#FEE500] py-3 text-sm font-semibold text-slate-900 transition-colors hover:bg-[#FADA0A]">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 3c-4.97 0-9 3.11-9 6.95 0 2.54 1.74 4.76 4.38 5.96l-1.12 4.1c-.04.14.01.3.13.38.05.03.11.05.17.05.08 0 .15-.03.21-.08l4.82-3.2c.13.01.27.02.41.02 4.97 0 9-3.11 9-6.95S16.97 3 12 3z"></path>
</svg>
                            카카오
                        </button>
</div>
<p class="text-center text-xs text-slate-400 dark:text-slate-500">
                        가입 시 CloudNote의 <a class="underline" href="#">이용약관</a> 및 <a class="underline" href="#">개인정보처리방침</a>에 동의하게 됩니다.
                    </p>
</div>
</div>
</div>
</div>
</body></html>
